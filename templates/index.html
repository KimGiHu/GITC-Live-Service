<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초거대AI 클라우드팜 GPU 가상자원 이용 신청</title>
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 650px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #333; text-align: center; margin-bottom: 25px; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        
        input[type="text"], input[type="email"], input[type="tel"] { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .checkbox-group label { display: inline-flex; align-items: center; font-weight: normal; margin: 0; }
        .checkbox-group input { margin-right: 5px; }

        .oneline-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            white-space: nowrap; 
            font-size: 14px;
        }
        .oneline-group input {
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-width: 0; 
        }
        
        .date-y { flex: 1.5; max-width: 65px; margin: 0 2px; }
        .date-md { flex: 1; max-width: 45px; margin: 0 2px; }
        .date-text { margin: 0 2px; }

        /* [수정된 부분] 자원 신청 한 줄 강제 정렬 */
        .resource-container {
            display: flex;
            flex-wrap: nowrap; /* 절대 줄바꿈 금지 */
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 5px;
            overflow-x: auto; /* 화면이 너무 좁으면 가로 스크롤 허용 */
            padding-bottom: 5px; /* 스크롤바 여백 */
        }
        .resource-item {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-weight: normal;
            font-size: 13px;
            margin: 0;
        }
        .resource-item input {
            width: 45px;
            text-align: center;
            padding: 6px 2px;
            margin-left: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        @media (max-width: 500px) {
            .oneline-group { font-size: 11px; justify-content: center; }
            .oneline-group input { padding: 6px 2px; font-size: 11px; }
            .date-y { max-width: 45px; margin: 0 1px; }
            .date-md { max-width: 30px; margin: 0 1px; }
            .date-text { margin: 0 1px; }
            
            /* 모바일 화면에서 자원 신청 폰트 및 박스 최적화 */
            .resource-container { gap: 4px; }
            .resource-item { font-size: 11px; }
            .resource-item input { width: 35px; padding: 4px 1px; font-size: 11px; }
        }
        
        button { width: 100%; padding: 15px; background-color: #0056b3; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>
    <div class="container">
        <h2>GPU 가상자원 이용 신청</h2>
        <form id="applyForm" action="/generate_pdf" method="post">
            <div class="form-group">
                <label>기업명 *</label>
                <input type="text" name="company name" required>
            </div>
            <div class="form-group">
                <label>대표자 성명 *</label>
                <input type="text" name="Representative Name" required>
            </div>
            <div class="form-group">
                <label>주소</label>
                <input type="text" name="Address" required>
            </div>
            <div class="form-group">
                <label>사업자등록번호</label>
                <input type="text" name="Business Registration Number" placeholder="000-00-00000" required>
            </div>
            <div class="form-group">
                <label>법인등록번호</label>
                <input type="text" name="Corporate Registration Number" placeholder="000000-0000000" required>
            </div>
            <div class="form-group">
                <label>업태/업종명</label>
                <input type="text" name="Business Type/Activity" required>
            </div>
            <div class="form-group">
                <label>기업담당자 성명/직위</label>
                <input type="text" name="Name / Position">
            </div>
            <div class="form-group">
                <label>기업담당자 휴대전화</label>
                <input type="tel" name="Mobile" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label>기업담당자 전화번호</label>
                <input type="tel" name="Tel">
            </div>
            <div class="form-group">
                <label>기업담당자 E-mail</label>
                <input type="email" name="Mail" placeholder="user@example.com">
            </div>
            
            <div class="form-group">
                <label>산업 분야 (다중 선택 가능)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="Traffic" value="0"> 교통</label>
                    <label><input type="checkbox" name="Life" value="0"> 생활</label>
                    <label><input type="checkbox" name="Manufacture" value="0"> 제조</label>
                    <label><input type="checkbox" name="Mobility_future" value="0"> 미래차</label>
                    <label><input type="checkbox" name="Military" value="0"> 국방</label>
                    <label><input type="checkbox" name="Environment" value="0"> 환경</label>
                    <label><input type="checkbox" name="Agriculture" value="0"> 농업</label>
                    <label><input type="checkbox" name="ETC" value="0"> 기타</label>
                </div>
            </div>
            <div class="form-group">
                <label>활용 목적</label>
                <input type="text" name="Purpose">
            </div>

            <div class="form-group">
                <label>서비스 이용기간</label>
                <div class="oneline-group">
                    <input type="number" class="date-y" name="1st year" placeholder="YYYY" min="2024"><span class="date-text">년</span>
                    <input type="number" class="date-md" name="1st month" placeholder="MM" min="1" max="12"><span class="date-text">월</span>
                    <input type="number" class="date-md" name="1st day" placeholder="DD" min="1" max="31"><span class="date-text">일</span>
                    <span class="date-text" style="margin: 0 4px;">~</span>
                    <input type="number" class="date-y" name="2nd year" placeholder="YYYY" min="2024"><span class="date-text">년</span>
                    <input type="number" class="date-md" name="2nd month" placeholder="MM" min="1" max="12"><span class="date-text">월</span>
                    <input type="number" class="date-md" name="2nd day" placeholder="DD" min="1" max="31"><span class="date-text">일</span>
                </div>
            </div>
            
            <div class="form-group">
                <label>신청 자원 (단위: 개)</label>
                <div class="resource-container">
                    <label class="resource-item">H100 <input type="number" name="H100 Number" value="0" min="0"></label>
                    <label class="resource-item">GPU 2 Slice <input type="number" name="GPU 2 slice" value="0" min="0"></label>
                    <label class="resource-item">GPU 3 Slice <input type="number" name="GPU 3 slice" value="0" min="0"></label>
                    <label class="resource-item">GPU 4 Slice <input type="number" name="GPU 4 slice" value="0" min="0"></label>
                </div>
            </div>
            
            <div class="form-group">
                <label>개인정보 수집 이용 동의여부 *</label>
                <div class="checkbox-group">
                    <label><input type="radio" name="Collection_Agreement" value="Agree" required> 동의</label>
                    <label><input type="radio" name="Collection_Agreement" value="Disagree"> 비동의</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>신청일자 및 서명</label>
                <div class="oneline-group" style="margin-bottom: 10px; justify-content: flex-start;">
                    <input type="number" class="date-y" name="Register Year" placeholder="YYYY" min="2024"><span class="date-text">년</span>
                    <input type="number" class="date-md" name="Register Month" placeholder="MM" min="1" max="12"><span class="date-text">월</span>
                    <input type="number" class="date-md" name="Register Day" placeholder="DD" min="1" max="31"><span class="date-text">일</span>
                </div>
                <input type="text" name="Application Business Name" placeholder="신청기업" style="margin-bottom: 8px;">
                <input type="text" name="Corporate Representative Name" placeholder="담당자 성명">
            </div>
            
            <button type="submit">신청서 PDF 다운로드</button>
        </form>
    </div>

    <script>
        document.getElementById("applyForm").addEventListener("submit", function(event) {
            const form = event.target;
            
            const mobileRegex = /^01[016789]-\d{3,4}-\d{4}$/;
            const bizRegex = /^\d{3}-\d{2}-\d{5}$/;
            const corpRegex = /^\d{6}-\d{7}$/;

            const mobile = form.elements["Mobile"].value.trim();
            const biz = form.elements["Business Registration Number"].value.trim();
            const corp = form.elements["Corporate Registration Number"].value.trim();

            if (mobile && !mobileRegex.test(mobile)) {
                alert("오류: 올바른 휴대전화 번호 형식이 아닙니다.\n하이픈(-)을 포함해주세요. (예: 010-1234-5678)");
                form.elements["Mobile"].focus();
                event.preventDefault(); 
                return;
            }
            if (biz && !bizRegex.test(biz)) {
                alert("오류: 올바른 사업자등록번호 형식이 아닙니다.\n(예: 123-45-67890)");
                form.elements["Business Registration Number"].focus();
                event.preventDefault(); 
                return;
            }
            if (corp && !corpRegex.test(corp)) {
                alert("오류: 올바른 법인등록번호 형식이 아닙니다.\n(예: 123456-1234567)");
                form.elements["Corporate Registration Number"].focus();
                event.preventDefault(); 
                return;
            }
        });
    </script>
</body>
</html>
